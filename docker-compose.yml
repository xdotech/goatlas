services:
  goatlas:
    build: .
    stdin_open: true
    tty: true
    environment:
      DATABASE_DSN: postgres://goatlas:goatlas@postgres:5432/goatlas
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASS: goatlas_neo4j
      QDRANT_URL: http://qdrant:6334
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-gemini}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://localhost:8001/v1}
      OPENAI_EMBED_BASE_URL: ${OPENAI_EMBED_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-ada-002}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: goatlas
      POSTGRES_USER: goatlas
      POSTGRES_PASSWORD: goatlas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goatlas"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/goatlas_neo4j
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
